stages:
  - build
  - release

variables:
  RUST_VERSION: "stable"

build-windows:
  stage: build
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  tags:
    - windows
  variables:
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"
  before_script:
    - |
      if (-not (Test-Path "C:\\rustup")) {
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
        .\rustup-init.exe -y --default-host x86_64-pc-windows-msvc --default-toolchain stable
        $env:PATH += ";C:\\rustup\\bin;C:\\cargo\\bin"
      }
    - cargo --version
    - rustc --version
  script:
    - cargo build --release --target x86_64-pc-windows-msvc
  artifacts:
    paths:
      - target/x86_64-pc-windows-msvc/release/zvukopad.exe
    expire_in: 1 week

release-windows:
  stage: release
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  tags:
    - windows
  needs: [build-windows]
  only:
    - tags
  variables:
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"
  script:
    - |
      $version = (Get-Content Cargo.toml | Select-String '^version\s*=').Line -replace '.*"([^"]+)".*', '$1'
      echo "VERSION=$version"
      copy target\x86_64-pc-windows-msvc\release\zvukopad.exe zvukopad-v$version.exe
    - |
      # Create release via GitLab API (requires CI_JOB_TOKEN or GITLAB_TOKEN)
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --header "Content-Type: multipart/form-data" \
           --form "tag_name=$CI_COMMIT_TAG" \
           --form "name=Звукопад $CI_COMMIT_TAG" \
           --form "description=См. RELEASES.md" \
           --form "assets[0][name]=zvukopad-v$version.exe" \
           --form "assets[0][file]=@zvukopad-v$version.exe" \
           "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/releases"
  artifacts:
    paths:
      - zvukopad-v*.exe
    expire_in: 1 year