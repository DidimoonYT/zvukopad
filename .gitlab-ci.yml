stages:
  - build
  - release

variables:
  RUST_VERSION: "stable"

build-windows:
  stage: build
  image: rust:latest
  before_script:
    - rustup target add x86_64-pc-windows-gnu
    - apt-get update -qq && apt-get install -y -qq mingw-w64
  script:
    - cargo build --release --target x86_64-pc-windows-gnu
  artifacts:
    paths:
      - target/x86_64-pc-windows-gnu/release/zvukopad.exe
    expire_in: 1 week

release-windows:
  stage: release
  image: alpine:latest
  needs: [build-windows]
  only:
    - tags
  before_script:
    - apk add --no-cache curl
  script:
    - |
      VERSION=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
      cp target/x86_64-pc-windows-gnu/release/zvukopad.exe "zvukopad-v${VERSION}.exe"
      echo "VERSION=${VERSION}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --header "Content-Type: multipart/form-data" \
           --form "tag_name=${CI_COMMIT_TAG}" \
           --form "name=Звукопад ${CI_COMMIT_TAG}" \
           --form "description=См. RELEASES.md" \
           --form "assets[0][name]=zvukopad-v${VERSION}.exe" \
           --form "assets[0][file]=@zvukopad-v${VERSION}.exe" \
           "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/releases"
  artifacts:
    paths:
      - zvukopad-v*.exe
    expire_in: 1 year